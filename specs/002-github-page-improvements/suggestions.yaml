# Improvement Suggestions Tracking

This file tracks the status of each improvement suggestion for the Jekyll GitHub Pages site, following the contract in contracts/improvement-suggestion.md.

# Status Transition Criteria
# - proposed → applied: Improvement is implemented and validated (manual/automated test, audit, or review completed; results documented below).
# - proposed → rejected: Improvement is reviewed and determined not applicable or beneficial; rationale documented below.
# - applied → (changelog): Impact and feedback are recorded after a reasonable observation period (e.g., performance metrics, accessibility audit, or user survey).

## Suggestions

- id: 001
  title: "Optimize images for faster load times"
  description: "Compress and resize images in assets/img/; add lazy loading for images and iframes."
  rationale: "Large, unoptimized images slow down page loads and hurt performance scores. Lazy loading improves perceived speed and user experience."
  priority: P1
  status: proposed
  reference: "https://developers.google.com/web/tools/lighthouse"
  dateSuggested: 2026-03-29

- id: 002
  title: "Automate CSS/JS minification"
  description: "Use Jekyll plugins or build tools to minify assets automatically."
  rationale: "Minified assets reduce bandwidth and improve load times, especially on mobile."
  priority: P1
  status: proposed
  reference: "https://github.com/mmistakes/minimal-mistakes"
  dateSuggested: 2026-03-29

- id: 003
  title: "Enhance SEO with meta tags and sitemap"
